name: Update Manifest

on:
  workflow_call:
  release:
    types: [published, deleted]

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch release data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh release list only exposes metadata; body+assets require gh release view
          gh release list --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft --limit 100 \
            | jq -r '.[] | select(.isDraft == false and .tagName != "") | .tagName' > /tmp/tags.txt

          # Fetch full details for each tag, then slurp into a single JSON array
          while IFS= read -r tag; do
            gh release view "$tag" --repo "$GITHUB_REPOSITORY" \
              --json tagName,publishedAt,body,assets
          done < /tmp/tags.txt | jq -s '.' > /tmp/releases.json

          # Download .zip.md5 files for checksums
          mkdir -p /tmp/release-assets
          while IFS= read -r release; do
            tag=$(echo "$release" | jq -r '.tagName')
            md5name=$(echo "$release" | jq -r '[.assets[] | select(.name | endswith(".zip.md5"))] | first | .name // empty')
            if [ -n "$md5name" ]; then
              gh release download "$tag" --repo "$GITHUB_REPOSITORY" \
                --pattern "$md5name" --dir /tmp/release-assets --clobber 2>/dev/null || true
            fi
          done < <(jq -c '.[]' /tmp/releases.json)

      - name: Generate manifest.json
        run: |
          pip install pyyaml --quiet
          python3 - <<'PYEOF'
          import json, os, yaml, pathlib

          with open('build.yaml') as f:
              meta = yaml.safe_load(f)

          with open('/tmp/releases.json') as f:
              releases = json.load(f)

          repo = os.environ['GITHUB_REPOSITORY']
          versions = []
          for rel in releases:
              zips = [a for a in rel['assets']
                      if a['name'].endswith('.zip') and not a['name'].endswith('.zip.md5')]
              md5s = [a for a in rel['assets'] if a['name'].endswith('.zip.md5')]
              if not zips:
                  continue

              tag = rel['tagName']
              zip_name = zips[0]['name']
              checksum = ''
              if md5s:
                  md5_file = pathlib.Path('/tmp/release-assets') / md5s[0]['name']
                  if md5_file.exists():
                      checksum = md5_file.read_text().strip()

              timestamp = rel['publishedAt']
              versions.append({
                  'version': tag.lstrip('v'),
                  'changelog': rel.get('body') or '',
                  'targetAbi': meta['targetAbi'],
                  'sourceUrl': f'https://github.com/{repo}/releases/download/{tag}/{zip_name}',
                  'checksum': checksum,
                  'timestamp': timestamp,
              })

          manifest = [{
              'guid': meta['guid'].lower(),
              'name': meta['name'],
              'description': meta.get('description', ''),
              'overview': meta.get('overview', ''),
              'owner': meta.get('owner', ''),
              'category': meta.get('category', 'General'),
              'versions': versions,
          }]

          pathlib.Path('_site').mkdir(exist_ok=True)
          with open('_site/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          PYEOF

      - name: Deploy manifest to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          commit_message: "Update manifest.json"
