name: Publish

on:
  push:
    tags:
      - 'v*.*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Package
        run: |
          mkdir -p dist
          zip -j dist/Jellyfin.Plugin.YtdlpThemeSongs_${{ steps.version.outputs.version }}.zip \
            Jellyfin.Plugin.YtdlpThemeSongs/bin/Release/net10.0/Jellyfin.Plugin.YtdlpThemeSongs.dll
          md5sum dist/Jellyfin.Plugin.YtdlpThemeSongs_${{ steps.version.outputs.version }}.zip \
            | awk '{ print $1 }' \
            > dist/Jellyfin.Plugin.YtdlpThemeSongs_${{ steps.version.outputs.version }}.zip.md5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  manifest:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Generate manifest.json and deploy to gh-pages
        uses: Kevinjil/jellyfin-plugin-repo-action@v0
        with:
          source_github_token: ${{ secrets.GITHUB_TOKEN }}
          target_github_token: ${{ secrets.GITHUB_TOKEN }}
          target_repository: ${{ github.repository }}
          target_branch: gh-pages
