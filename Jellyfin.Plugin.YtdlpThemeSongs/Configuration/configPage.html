<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Theme Songs</title>
</head>

<body>
    <div id="TemplateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage tbsConfigurationPage"
        data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <form id="TemplateConfigForm" class="tbsConfigurationPage">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">Theme Songs</h2>
                        <a is="emby-linkbutton" class="raised button-alt headerHelpButton emby-button" target="_blank"
                            href="https://github.com/danieladov/jellyfin-plugin-themesongs">Help</a>
                    </div>
                    <div class="verticalSection">
                        <label class="inputLabel inputLabelUnfocused" for="tvSeriesSearchQuery">TV series search query</label>
                        <input is="emby-input" type="text" id="tvSeriesSearchQuery" />
                        <div class="fieldDescription">Placeholders: {title}, {year}</div>
                    </div>
                    <div class="verticalSection">
                        <label class="inputLabel inputLabelUnfocused" for="tvSeasonSearchQuery">TV season search query</label>
                        <input is="emby-input" type="text" id="tvSeasonSearchQuery" />
                        <div class="fieldDescription">Placeholders: {seriesTitle}, {seasonNumber}, {year}</div>
                    </div>
                    <div class="verticalSection">
                        <label class="inputLabel inputLabelUnfocused" for="movieSearchQuery">Movie search query</label>
                        <input is="emby-input" type="text" id="movieSearchQuery" />
                        <div class="fieldDescription">Placeholders: {title}, {year}</div>
                    </div>
                    <div class="verticalSection">
                        <label class="inputLabel inputLabelUnfocused" for="ytDlpPath">yt-dlp path (optional)</label>
                        <input is="emby-input" type="text" id="ytDlpPath" />
                        <div class="fieldDescription">Leave blank to auto-detect from common paths and PATH.</div>
                    </div>
                    <br />
                    <button is="emby-button" type="submit" class="raised block"><span>Save</span></button>
                    <button is="emby-button" type="button" class="raised block" id="refresh-library"
                        onclick="download()"><span>Download Theme Songs</span></button>

                    <br />
                    <div class="sectionTitleContainer flex align-items-center" style="margin-top:1.5em;">
                        <h2 class="sectionTitle">Debug</h2>
                    </div>

                    <div class="verticalSection">
                        <button is="emby-button" type="button" class="raised block" id="deleteAllThemes">
                            <span>Delete All Theme Songs</span>
                        </button>
                    </div>

                    <div id="debug-series" style="margin-top:1.5em;">
                        <h3 style="margin-bottom:0.5em;">TV Series</h3>
                        <p id="debug-series-label" class="fieldDescription">Loading...</p>
                        <div class="verticalSection">
                            <label class="inputLabel inputLabelUnfocused">Search query</label>
                            <input is="emby-input" type="text" id="debug-series-query" />
                        </div>
                        <button is="emby-button" type="button" class="raised" id="debug-series-btn">
                            <span>Download</span>
                        </button>
                        <div id="debug-series-log" style="height:180px;overflow-y:auto;background:#111;color:#ccc;font-family:monospace;font-size:12px;padding:8px;margin-top:8px;border-radius:4px;white-space:pre-wrap;"></div>
                        <audio id="debug-series-audio" controls style="width:100%;margin-top:8px;display:none;"></audio>
                    </div>

                    <div id="debug-season" style="margin-top:1.5em;">
                        <h3 style="margin-bottom:0.5em;">TV Season</h3>
                        <p id="debug-season-label" class="fieldDescription">Loading...</p>
                        <div class="verticalSection">
                            <label class="inputLabel inputLabelUnfocused">Search query</label>
                            <input is="emby-input" type="text" id="debug-season-query" />
                        </div>
                        <button is="emby-button" type="button" class="raised" id="debug-season-btn">
                            <span>Download</span>
                        </button>
                        <div id="debug-season-log" style="height:180px;overflow-y:auto;background:#111;color:#ccc;font-family:monospace;font-size:12px;padding:8px;margin-top:8px;border-radius:4px;white-space:pre-wrap;"></div>
                        <audio id="debug-season-audio" controls style="width:100%;margin-top:8px;display:none;"></audio>
                    </div>

                    <div id="debug-movie" style="margin-top:1.5em;">
                        <h3 style="margin-bottom:0.5em;">Movie</h3>
                        <p id="debug-movie-label" class="fieldDescription">Loading...</p>
                        <div class="verticalSection">
                            <label class="inputLabel inputLabelUnfocused">Search query</label>
                            <input is="emby-input" type="text" id="debug-movie-query" />
                        </div>
                        <button is="emby-button" type="button" class="raised" id="debug-movie-btn">
                            <span>Download</span>
                        </button>
                        <div id="debug-movie-log" style="height:180px;overflow-y:auto;background:#111;color:#ccc;font-family:monospace;font-size:12px;padding:8px;margin-top:8px;border-radius:4px;white-space:pre-wrap;"></div>
                        <audio id="debug-movie-audio" controls style="width:100%;margin-top:8px;display:none;"></audio>
                    </div>
                </form>
            </div>
        </div>


        <script type="text/javascript">
            const pluginId = "8dd7851b-67e5-4b50-9bbd-69368c7e67ee";
            const configurationForm = document.querySelector(".tbsConfigurationPage");
            const tvSeriesSearchQueryInput = document.querySelector("#tvSeriesSearchQuery");
            const tvSeasonSearchQueryInput = document.querySelector("#tvSeasonSearchQuery");
            const movieSearchQueryInput = document.querySelector("#movieSearchQuery");
            const ytDlpPathInput = document.querySelector("#ytDlpPath");

            function loadConfiguration() {
                ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                    tvSeriesSearchQueryInput.value = (config.TvSeriesSearchQuery || "").toString();
                    tvSeasonSearchQueryInput.value = (config.TvSeasonSearchQuery || "").toString();
                    movieSearchQueryInput.value = (config.MovieSearchQuery || "").toString();
                    ytDlpPathInput.value = (config.YtDlpPath || "").toString();
                }).catch(function () {
                    Dashboard.alert({
                        message: "Unable to load configuration. Please try again."
                    });
                });
            }

            if (configurationForm) {
                configurationForm.addEventListener("submit", function (event) {
                    event.preventDefault();
                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        config.TvSeriesSearchQuery = tvSeriesSearchQueryInput.value.trim();
                        config.TvSeasonSearchQuery = tvSeasonSearchQueryInput.value.trim();
                        config.MovieSearchQuery = movieSearchQueryInput.value.trim();
                        config.YtDlpPath = ytDlpPathInput.value.trim();
                        return ApiClient.updatePluginConfiguration(pluginId, config);
                    }).then(Dashboard.processPluginConfigurationUpdateResult).catch(function () {
                        Dashboard.alert({
                            message: "Unable to save configuration. Please try again."
                        });
                    });
                });
            }

            function download() {
                var request = {
                    url: ApiClient.getUrl('/ThemeSongs/DownloadAll'),
                    type: 'POST'
                };

                ApiClient.fetch(request).then(function () {
                    Dashboard.alert("Downloading Theme Songs...");
                }).catch(function () {
                    Dashboard.alert({
                        message: "Unexpected error occurred!"
                    });
                });
            }

            // ── Debug section ────────────────────────────────────────────────

            function appendLog(logEl, msg) {
                logEl.textContent += msg + '\n';
                logEl.scrollTop = logEl.scrollHeight;
            }

            function handleSseMessage(raw, type, itemId, logEl, audioEl, btn) {
                var eventType = 'message';
                var data = '';
                raw.split('\n').forEach(function (line) {
                    if (line.startsWith('event:')) {
                        eventType = line.slice(6).trim();
                    } else if (line.startsWith('data:')) {
                        data = line.slice(5).trim();
                    }
                });

                var parsed;
                try { parsed = JSON.parse(data); } catch (e) { parsed = data; }

                if (eventType === 'log') {
                    appendLog(logEl, parsed);
                } else if (eventType === 'done') {
                    appendLog(logEl, 'Done! Loading audio player...');
                    var audioUrl = ApiClient.getUrl('/ThemeSongs/ThemeAudio') +
                        '?itemId=' + encodeURIComponent(itemId) +
                        '&itemType=' + encodeURIComponent(type) +
                        '&api_key=' + encodeURIComponent(ApiClient.accessToken());
                    audioEl.src = audioUrl;
                    audioEl.style.display = 'block';
                    btn.disabled = false;
                } else if (eventType === 'error') {
                    appendLog(logEl, 'ERROR: ' + parsed);
                    btn.disabled = false;
                }
            }

            async function startDebugDownload(type, itemId, query, logEl, audioEl, btn) {
                btn.disabled = true;
                logEl.textContent = '';
                audioEl.style.display = 'none';
                audioEl.src = '';

                var params = new URLSearchParams({ itemId: itemId, itemType: type, query: query });
                var url = ApiClient.getUrl('/ThemeSongs/DownloadDebug') + '?' + params.toString();

                var reader;
                try {
                    var resp = await fetch(url, {
                        headers: { 'Authorization': 'MediaBrowser Token="' + ApiClient.accessToken() + '"' }
                    });

                    if (!resp.ok) {
                        appendLog(logEl, 'Error: HTTP ' + resp.status);
                        btn.disabled = false;
                        return;
                    }

                    reader = resp.body.getReader();
                    var decoder = new TextDecoder();
                    var buffer = '';

                    while (true) {
                        var result = await reader.read();
                        if (result.done) break;
                        buffer += decoder.decode(result.value, { stream: true });
                        var messages = buffer.split('\n\n');
                        buffer = messages.pop();
                        messages.forEach(function (msg) {
                            if (msg.trim()) {
                                handleSseMessage(msg, type, itemId, logEl, audioEl, btn);
                            }
                        });
                    }
                } catch (e) {
                    appendLog(logEl, 'Connection error: ' + e.message);
                    btn.disabled = false;
                } finally {
                    if (reader) {
                        try { reader.cancel(); } catch (e) {}
                    }
                }
            }

            async function initDebugPanel(type) {
                var labelEl = document.getElementById('debug-' + type + '-label');
                var queryEl = document.getElementById('debug-' + type + '-query');
                var btn     = document.getElementById('debug-' + type + '-btn');
                var logEl   = document.getElementById('debug-' + type + '-log');
                var audioEl = document.getElementById('debug-' + type + '-audio');
                var currentItemId = null;

                try {
                    var resp = await fetch(
                        ApiClient.getUrl('/ThemeSongs/RandomItem') + '?type=' + encodeURIComponent(type),
                        { headers: { 'Authorization': 'MediaBrowser Token="' + ApiClient.accessToken() + '"' } }
                    );

                    if (resp.status === 404) {
                        labelEl.textContent = 'No items of this type found in library.';
                        btn.disabled = true;
                        return;
                    }

                    if (!resp.ok) {
                        labelEl.textContent = 'Error loading library item (HTTP ' + resp.status + ').';
                        btn.disabled = true;
                        return;
                    }

                    var data = await resp.json();
                    currentItemId = data.id;
                    labelEl.textContent = data.displayName;
                    queryEl.value = data.query;

                    btn.addEventListener('click', function () {
                        startDebugDownload(type, currentItemId, queryEl.value.trim(), logEl, audioEl, btn);
                    });
                } catch (e) {
                    labelEl.textContent = 'Error loading library item: ' + e.message;
                    btn.disabled = true;
                }
            }

            document.getElementById('deleteAllThemes').addEventListener('click', function () {
                if (!confirm('This will permanently delete ALL theme.mp3 files from your library. Are you absolutely sure?')) {
                    return;
                }
                fetch(ApiClient.getUrl('/ThemeSongs/DeleteAll'), {
                    method: 'DELETE',
                    headers: { 'Authorization': 'MediaBrowser Token="' + ApiClient.accessToken() + '"' }
                }).then(function (r) {
                    return r.json();
                }).then(function (data) {
                    Dashboard.alert({ message: 'Deleted ' + data.deletedCount + ' theme song(s).' });
                }).catch(function () {
                    Dashboard.alert({ message: 'Error deleting theme songs.' });
                });
            });

            loadConfiguration();
            ['series', 'season', 'movie'].forEach(initDebugPanel);
        </script>
    </div>
</body>
</html>
